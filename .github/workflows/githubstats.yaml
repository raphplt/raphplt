name: Update GitHub stats
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-stats
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: readme-tools/github-readme-stats-action@v1
        continue-on-error: true
        with:
          card: stats
          options: username=raphplt&show_icons=true&theme=transparent
          path: profile/stats.svg

      - uses: readme-tools/github-readme-stats-action@v1
        continue-on-error: true
        with:
          card: top-langs
          options: username=raphplt&layout=compact&langs_count=8&theme=transparent
          path: profile/top-langs.svg

      - uses: readme-tools/github-readme-stats-action@v1
        continue-on-error: true
        with:
          card: pin
          options: username=raphplt&repo=QoreDB&theme=transparent
          path: profile/qoredb.svg

      - name: Discard broken cards
        run: |
          for f in profile/stats.svg profile/top-langs.svg profile/qoredb.svg; do
            if [ ! -s "$f" ] \
               || ! head -c 200 "$f" | grep -qi '<svg' \
               || grep -qiE 'something went wrong|resource limits|rate limit|error' "$f"; then
              echo "::warning::$f invalide, restauration de la version précédente"
              git checkout -- "$f" 2>/dev/null || rm -f "$f"
            fi
          done

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add -A profile/
          git diff --cached --quiet && exit 0
          git commit -m "chore: update stats cards"
          git push
